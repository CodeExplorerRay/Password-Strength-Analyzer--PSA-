name: Schedule Weekly Post

on:
  schedule:
    - cron: "0 10 * * 1" # Every Monday at 10:00 UTC
  workflow_dispatch:

jobs:
  publish_post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.name "SecurePass Bot"
          git config --global user.email "bot@securepass.linkpc.net"

      - name: Publish next scheduled post
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          SCHEDULE_DIR="content/2025/_scheduled"
          PUBLISH_DIR="content/2025/published"
          
          # Exit early if directory doesn't exist
          if [ ! -d "$SCHEDULE_DIR" ]; then
            echo "Schedule directory not found: $SCHEDULE_DIR"
            exit 0
          fi
          
          NEXT_FILE=$(find "$SCHEDULE_DIR" -type f -name "*.md" | sort | head -n 1)
          if [ -n "$NEXT_FILE" ]; then
            echo "Publishing $NEXT_FILE"
            mkdir -p "$PUBLISH_DIR"
            mv "$NEXT_FILE" "$PUBLISH_DIR/"
            git add -A
            git commit -m "📰 Auto-publish: $(basename "$NEXT_FILE")" || echo "No changes to commit"
            git push "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" HEAD:main
          else
            echo "No scheduled posts found."
          fi

      - name: Trigger Vercel Deploy Hook (optional)
        if: env.VERCEL_HOOK_URL != ''
        run: |
          curl -X POST "$VERCEL_HOOK_URL"
        env:
          VERCEL_HOOK_URL: ${{ secrets.VERCEL_HOOK_URL }}
